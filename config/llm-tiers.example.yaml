# Copy to config/llm-tiers.yaml — adjust models to current provider IDs.

providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
  openai:
    api_key_env: OPENAI_API_KEY

tiers:
  low:
    provider: anthropic
    model: claude-haiku-4-20250514
  medium:
    provider: anthropic
    model: claude-sonnet-4-20250514
  high:
    provider: anthropic
    model: claude-sonnet-4-20250514
  highest:
    provider: anthropic
    model: claude-opus-4-20250514

step_tiers:
  classify_intent: low
  noise_filter: low
  confirm_parse: medium
  schema_drift_parse: medium
  escalation_message: medium
  answer: high
  task_proposal: high
  cross_link_rationale: medium
