# Committed example — copy to credential-profiles.yaml (or merge into config loader).
# NEVER put secret values in this file.

profiles:
  slack_main:
    kind: slack
    env: SLACK_BOT_TOKEN
    signing_secret_env: SLACK_SIGNING_SECRET

  github_org:
    kind: github
    env: GITHUB_TOKEN

  notion_ws_main:
    kind: notion
    read_env: NOTION_TOKEN_MAIN
    mcp_service: notion-mcp-main
    write_env: NOTION_TOKEN_MAIN
